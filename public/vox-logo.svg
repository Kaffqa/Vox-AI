<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32" fill="none">
  <defs>
    <linearGradient id="vox-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#06b6d4"/>
      <stop offset="100%" stop-color="#8b5cf6"/>
    </linearGradient>
  </defs>
  <!-- Microphone body -->
  <rect x="11" y="4" width="10" height="14" rx="5" fill="url(#vox-grad)"/>
  <!-- Left arc -->
  <path d="M8 16 A8 8 0 0 0 24 16" stroke="url(#vox-grad)" stroke-width="2" stroke-linecap="round" fill="none"/>
  <!-- Stand -->
  <line x1="16" y1="24" x2="16" y2="28" stroke="url(#vox-grad)" stroke-width="2" stroke-linecap="round"/>
  <!-- Base -->
  <line x1="12" y1="28" x2="20" y2="28" stroke="url(#vox-grad)" stroke-width="2" stroke-linecap="round"/>
</svg>
